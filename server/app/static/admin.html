<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DingPay 卡密后台</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --text: #20231f;
      --muted: #667064;
      --line: #dfe4db;
      --primary: #20745b;
      --primary-strong: #165542;
      --danger: #b73535;
      --warning: #a66300;
      --info: #2563a8;
      --shadow: 0 12px 28px rgba(37, 45, 35, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0 22px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 8px;
      background: var(--primary);
      color: #ffffff;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .subtle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .session {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      margin-top: 22px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.3;
    }

    .panel-body {
      padding: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    label {
      color: #394238;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid #cdd5ca;
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      padding: 9px 11px;
      outline: none;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(32, 116, 91, 0.14);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      min-height: 40px;
      border-radius: 6px;
      padding: 0 14px;
      background: #e8ede5;
      color: #223026;
      font-weight: 700;
    }

    .btn.primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: var(--primary-strong);
    }

    .btn.danger {
      background: #f6dddd;
      color: var(--danger);
    }

    .btn.ghost {
      background: transparent;
      color: var(--primary);
      border: 1px solid #bad0c6;
    }

    .notice {
      display: none;
      margin-top: 14px;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .notice.show {
      display: block;
    }

    .notice.ok {
      background: #e5f4ec;
      color: #13533f;
    }

    .notice.err {
      background: #fae7e5;
      color: #8e2c28;
    }

    .hidden {
      display: none !important;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }

    .stat-label {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 150px auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 780px;
      border-collapse: collapse;
      background: #ffffff;
    }

    th,
    td {
      padding: 12px 11px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      background: #f2f5ef;
      color: #414b3f;
      font-size: 12px;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .mono {
      font-family: Consolas, "Courier New", monospace;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status.unused {
      background: #e7eefb;
      color: var(--info);
    }

    .status.active {
      background: #e1f4ea;
      color: #16704d;
    }

    .status.expired {
      background: #f8eedc;
      color: var(--warning);
    }

    .status.disabled {
      background: #f5dfdf;
      color: var(--danger);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .small-btn {
      min-height: 32px;
      border-radius: 6px;
      padding: 0 10px;
      background: #eef2ea;
      color: #263329;
      font-size: 12px;
      font-weight: 700;
    }

    .small-btn.danger {
      background: #f8e1e1;
      color: var(--danger);
    }

    .empty {
      padding: 34px 20px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed #cbd3c7;
      border-radius: 8px;
      background: #fbfcfa;
    }

    .generated {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .layout,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .session {
        white-space: normal;
      }
    }

    @media (max-width: 520px) {
      .shell {
        width: min(100vw - 20px, 1180px);
        padding-top: 12px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .panel-head,
      .panel-body {
        padding: 14px;
      }

      .btn,
      .small-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark">DP</div>
        <div>
          <h1>DingPay 卡密后台</h1>
          <div class="subtle">授权卡生成、绑定状态、禁用与解绑</div>
        </div>
      </div>
      <div class="session">
        <span id="sessionText">未登录</span>
        <button id="logoutBtn" class="btn ghost hidden" type="button">退出</button>
      </div>
    </header>

    <section id="loginView" class="layout">
      <aside class="panel">
        <div class="panel-head">
          <h2>管理员登录</h2>
        </div>
        <div class="panel-body">
          <form id="loginForm">
            <div class="field">
              <label for="username">用户名</label>
              <input id="username" name="username" autocomplete="username" value="admin" required>
            </div>
            <div class="field">
              <label for="password">密码</label>
              <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <button id="loginBtn" class="btn primary" type="submit">登录</button>
          </form>
          <div id="loginNotice" class="notice"></div>
        </div>
      </aside>
      <section class="panel">
        <div class="panel-head">
          <h2>后台状态</h2>
        </div>
        <div class="panel-body">
          <div id="healthText" class="empty">正在检查服务</div>
        </div>
      </section>
    </section>

    <section id="appView" class="layout hidden">
      <aside class="panel">
        <div class="panel-head">
          <h2>生成卡密</h2>
        </div>
        <div class="panel-body">
          <form id="generateForm">
            <div class="field">
              <label for="count">数量</label>
              <input id="count" name="count" type="number" min="1" max="500" value="10" required>
            </div>
            <div class="field">
              <label for="durationDays">有效天数</label>
              <select id="durationDays" name="durationDays">
                <option value="0">永久</option>
                <option value="1">1 天</option>
                <option value="7" selected>7 天</option>
                <option value="30">30 天</option>
                <option value="90">90 天</option>
                <option value="365">365 天</option>
              </select>
            </div>
            <div class="field">
              <label for="customDays">自定义天数</label>
              <input id="customDays" name="customDays" type="number" min="1" max="3650" placeholder="留空则使用上方套餐，永久请选择上方选项">
            </div>
            <div class="btn-row">
              <button id="generateBtn" class="btn primary" type="submit">生成</button>
              <button id="refreshSideBtn" class="btn" type="button">刷新</button>
            </div>
          </form>
          <div id="generateNotice" class="notice"></div>
          <div id="generatedBox" class="generated hidden">
            <label for="generatedKeys">新生成卡密</label>
            <textarea id="generatedKeys" readonly></textarea>
            <div class="btn-row">
              <button id="copyGeneratedBtn" class="btn" type="button">复制</button>
              <button id="downloadGeneratedBtn" class="btn" type="button">下载 TXT</button>
            </div>
          </div>
        </div>
      </aside>

      <section>
        <div class="stats">
          <div class="stat">
            <div id="statTotal" class="stat-value">0</div>
            <div class="stat-label">总卡密</div>
          </div>
          <div class="stat">
            <div id="statUnused" class="stat-value">0</div>
            <div class="stat-label">未使用</div>
          </div>
          <div class="stat">
            <div id="statActive" class="stat-value">0</div>
            <div class="stat-label">已激活</div>
          </div>
          <div class="stat">
            <div id="statDisabled" class="stat-value">0</div>
            <div class="stat-label">已禁用</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>卡密列表</h2>
            <button id="refreshBtn" class="btn ghost" type="button">刷新</button>
          </div>
          <div class="panel-body">
            <div class="toolbar">
              <input id="searchInput" type="search" placeholder="搜索卡密尾号或设备 ID">
              <select id="statusFilter">
                <option value="">全部状态</option>
                <option value="unused">未使用</option>
                <option value="active">已激活</option>
                <option value="expired">已过期</option>
                <option value="disabled">已禁用</option>
              </select>
              <button id="exportBtn" class="btn" type="button">导出 CSV</button>
            </div>
            <div id="tableWrap" class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>卡密尾号</th>
                    <th>状态</th>
                    <th>有效期</th>
                    <th>设备 ID</th>
                    <th>激活时间</th>
                    <th>到期时间</th>
                    <th>最后校验</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="cardsBody"></tbody>
              </table>
            </div>
            <div id="emptyState" class="empty hidden">暂无卡密</div>
            <div id="listNotice" class="notice"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const tokenKey = "dingpay-admin-token";
    const state = {
      token: localStorage.getItem(tokenKey) || "",
      cards: [],
      generatedKeys: [],
      loading: false
    };

    const el = {
      loginView: document.querySelector("#loginView"),
      appView: document.querySelector("#appView"),
      loginForm: document.querySelector("#loginForm"),
      generateForm: document.querySelector("#generateForm"),
      username: document.querySelector("#username"),
      password: document.querySelector("#password"),
      loginBtn: document.querySelector("#loginBtn"),
      logoutBtn: document.querySelector("#logoutBtn"),
      sessionText: document.querySelector("#sessionText"),
      loginNotice: document.querySelector("#loginNotice"),
      generateNotice: document.querySelector("#generateNotice"),
      listNotice: document.querySelector("#listNotice"),
      healthText: document.querySelector("#healthText"),
      count: document.querySelector("#count"),
      durationDays: document.querySelector("#durationDays"),
      customDays: document.querySelector("#customDays"),
      generatedBox: document.querySelector("#generatedBox"),
      generatedKeys: document.querySelector("#generatedKeys"),
      copyGeneratedBtn: document.querySelector("#copyGeneratedBtn"),
      downloadGeneratedBtn: document.querySelector("#downloadGeneratedBtn"),
      refreshBtn: document.querySelector("#refreshBtn"),
      refreshSideBtn: document.querySelector("#refreshSideBtn"),
      exportBtn: document.querySelector("#exportBtn"),
      searchInput: document.querySelector("#searchInput"),
      statusFilter: document.querySelector("#statusFilter"),
      cardsBody: document.querySelector("#cardsBody"),
      tableWrap: document.querySelector("#tableWrap"),
      emptyState: document.querySelector("#emptyState"),
      statTotal: document.querySelector("#statTotal"),
      statUnused: document.querySelector("#statUnused"),
      statActive: document.querySelector("#statActive"),
      statDisabled: document.querySelector("#statDisabled")
    };

    const statusText = {
      unused: "未使用",
      active: "已激活",
      expired: "已过期",
      disabled: "已禁用"
    };

    function setNotice(node, message, kind) {
      node.textContent = message || "";
      node.className = message ? `notice ${kind || "ok"} show` : "notice";
    }

    function setLoading(button, loading, text) {
      if (!button) return;
      button.disabled = loading;
      if (text) button.textContent = loading ? "处理中" : text;
    }

    async function api(path, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };
      if (state.token) headers.Authorization = `Bearer ${state.token}`;
      const response = await fetch(path, { ...options, headers });
      const text = await response.text();
      let payload = {};
      if (text) {
        try {
          payload = JSON.parse(text);
        } catch {
          payload = { detail: text };
        }
      }
      if (!response.ok) {
        const detail = payload.detail || `请求失败：${response.status}`;
        throw new Error(Array.isArray(detail) ? detail.map(item => item.msg).join("；") : detail);
      }
      return payload;
    }

    function switchView() {
      const loggedIn = Boolean(state.token);
      el.loginView.classList.toggle("hidden", loggedIn);
      el.appView.classList.toggle("hidden", !loggedIn);
      el.logoutBtn.classList.toggle("hidden", !loggedIn);
      el.sessionText.textContent = loggedIn ? "已登录" : "未登录";
      if (loggedIn) loadCards();
    }

    async function checkHealth() {
      try {
        await api("/health", { headers: {} });
        el.healthText.textContent = "服务运行正常";
      } catch (error) {
        el.healthText.textContent = error.message;
      }
    }

    async function login(event) {
      event.preventDefault();
      setNotice(el.loginNotice, "");
      setLoading(el.loginBtn, true, "登录");
      try {
        const payload = await api("/api/admin/login", {
          method: "POST",
          body: JSON.stringify({
            username: el.username.value.trim(),
            password: el.password.value
          })
        });
        state.token = payload.token;
        localStorage.setItem(tokenKey, state.token);
        el.password.value = "";
        switchView();
      } catch (error) {
        setNotice(el.loginNotice, error.message, "err");
      } finally {
        setLoading(el.loginBtn, false, "登录");
      }
    }

    function logout() {
      state.token = "";
      state.cards = [];
      localStorage.removeItem(tokenKey);
      renderCards();
      switchView();
    }

    async function generateCards(event) {
      event.preventDefault();
      setNotice(el.generateNotice, "");
      setLoading(document.querySelector("#generateBtn"), true, "生成");
      const customDays = Number(el.customDays.value);
      const durationDays = customDays > 0 ? customDays : Number(el.durationDays.value);
      try {
        const payload = await api("/api/admin/cards/generate", {
          method: "POST",
          body: JSON.stringify({
            count: Number(el.count.value),
            durationDays
          })
        });
        state.generatedKeys = payload.licenseKeys || [];
        el.generatedKeys.value = state.generatedKeys.join("\n");
        el.generatedBox.classList.toggle("hidden", state.generatedKeys.length === 0);
        setNotice(el.generateNotice, `已生成 ${state.generatedKeys.length} 张卡密`, "ok");
        await loadCards();
      } catch (error) {
        setNotice(el.generateNotice, error.message, "err");
      } finally {
        setLoading(document.querySelector("#generateBtn"), false, "生成");
      }
    }

    async function loadCards() {
      if (!state.token) return;
      setNotice(el.listNotice, "");
      try {
        state.cards = await api("/api/admin/cards");
        renderCards();
      } catch (error) {
        if (error.message.includes("token")) logout();
        setNotice(el.listNotice, error.message, "err");
      }
    }

    function filteredCards() {
      const keyword = el.searchInput.value.trim().toLowerCase();
      const status = el.statusFilter.value;
      return state.cards.filter(card => {
        const matchesStatus = !status || card.status === status;
        const fields = [card.keyPreview, card.deviceId, String(card.id)].join(" ").toLowerCase();
        return matchesStatus && (!keyword || fields.includes(keyword));
      });
    }

    function renderStats() {
      const counts = state.cards.reduce((acc, card) => {
        acc[card.status] = (acc[card.status] || 0) + 1;
        return acc;
      }, {});
      el.statTotal.textContent = state.cards.length;
      el.statUnused.textContent = counts.unused || 0;
      el.statActive.textContent = counts.active || 0;
      el.statDisabled.textContent = counts.disabled || 0;
    }

    function renderCards() {
      renderStats();
      const cards = filteredCards();
      el.cardsBody.innerHTML = "";
      el.tableWrap.classList.toggle("hidden", cards.length === 0);
      el.emptyState.classList.toggle("hidden", cards.length !== 0);
      el.emptyState.textContent = state.cards.length ? "没有匹配的卡密" : "暂无卡密";
      for (const card of cards) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="mono">${escapeHtml(card.id)}</td>
          <td class="mono">${escapeHtml(card.keyPreview || "-")}</td>
          <td><span class="status ${escapeHtml(card.status)}">${escapeHtml(statusText[card.status] || card.status)}</span></td>
          <td>${escapeHtml(formatDuration(card.durationDays))}</td>
          <td class="mono">${escapeHtml(card.deviceId || "-")}</td>
          <td>${escapeHtml(formatDate(card.activatedAt))}</td>
          <td>${escapeHtml(formatExpiry(card))}</td>
          <td>${escapeHtml(formatDate(card.lastSeenAt))}</td>
          <td>
            <div class="actions">
              <button class="small-btn" data-action="unbind" data-id="${escapeHtml(card.id)}" ${card.deviceId ? "" : "disabled"}>解绑</button>
              <button class="small-btn danger" data-action="disable" data-id="${escapeHtml(card.id)}" ${card.status === "disabled" ? "disabled" : ""}>禁用</button>
              <button class="small-btn danger" data-action="delete" data-id="${escapeHtml(card.id)}">删除</button>
            </div>
          </td>
        `;
        el.cardsBody.appendChild(row);
      }
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    function formatDuration(durationDays) {
      return Number(durationDays) === 0 ? "永久" : `${durationDays} 天`;
    }

    function formatExpiry(card) {
      return Number(card.durationDays) === 0 ? "永久" : formatDate(card.expiresAt);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function handleTableClick(event) {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const id = button.dataset.id;
      const action = button.dataset.action;
      const text = action === "delete"
        ? "确认删除这张卡密？删除后不可恢复。"
        : action === "disable"
          ? "确认禁用这张卡密？"
          : "确认解绑这张卡密？";
      if (!window.confirm(text)) return;
      button.disabled = true;
      try {
        if (action === "delete") {
          await api(`/api/admin/cards/${id}`, { method: "DELETE" });
        } else {
          await api(`/api/admin/cards/${id}/${action}`, { method: "POST", body: "{}" });
        }
        await loadCards();
      } catch (error) {
        setNotice(el.listNotice, error.message, "err");
        button.disabled = false;
      }
    }

    async function copyGenerated() {
      if (!state.generatedKeys.length) return;
      await navigator.clipboard.writeText(state.generatedKeys.join("\n"));
      setNotice(el.generateNotice, "已复制", "ok");
    }

    function downloadText(filename, text) {
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function downloadGenerated() {
      if (!state.generatedKeys.length) return;
      downloadText(`dingpay-license-${Date.now()}.txt`, state.generatedKeys.join("\n"));
    }

    function exportCsv() {
      const rows = [["ID", "卡密尾号", "状态", "有效天数", "设备ID", "创建时间", "激活时间", "到期时间", "禁用时间", "最后校验"]];
      for (const card of filteredCards()) {
        rows.push([
          card.id,
          card.keyPreview,
          statusText[card.status] || card.status,
          formatDuration(card.durationDays),
          card.deviceId || "",
          formatDate(card.createdAt),
          formatDate(card.activatedAt),
          formatExpiry(card),
          formatDate(card.disabledAt),
          formatDate(card.lastSeenAt)
        ]);
      }
      const csv = rows.map(row => row.map(csvCell).join(",")).join("\n");
      downloadText(`dingpay-cards-${Date.now()}.csv`, `\ufeff${csv}`);
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    el.loginForm.addEventListener("submit", login);
    el.generateForm.addEventListener("submit", generateCards);
    el.logoutBtn.addEventListener("click", logout);
    el.refreshBtn.addEventListener("click", loadCards);
    el.refreshSideBtn.addEventListener("click", loadCards);
    el.copyGeneratedBtn.addEventListener("click", copyGenerated);
    el.downloadGeneratedBtn.addEventListener("click", downloadGenerated);
    el.exportBtn.addEventListener("click", exportCsv);
    el.searchInput.addEventListener("input", renderCards);
    el.statusFilter.addEventListener("change", renderCards);
    el.cardsBody.addEventListener("click", handleTableClick);

    checkHealth();
    switchView();
  </script>
</body>
</html>
